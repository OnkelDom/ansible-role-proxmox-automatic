---
name: CI

'on':
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y xorriso isolinux syslinux libarchive-tools

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Prepare CI role path
        run: |
          mkdir -p .ci-roles
          ln -sfn "$PWD" .ci-roles/proxmox_automatic

      - name: Run CI validation suite
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/.ci-roles
        run: make ci
