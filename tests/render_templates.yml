- name: Render Debian preseed override variant
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../defaults/main.yml
  vars:
    ansible_host: "db01.lenmail.de"
    proxmox_automatic_language: "en_US.UTF-8"
    proxmox_automatic_keyboard_layout: "de"
    proxmox_automatic_timezone: "Europe/Berlin"
    proxmox_automatic_dhcp_enabled: true
    proxmox_automatic_networks: []
    proxmox_automatic_storage_config:
      - name: virtio0
        disk: vda
        bootloader: true
        partitions: []
        vg: []
    proxmox_automatic_users_merged:
      - name: "dbadmin"
        fullname: "DB Admin"
        password: "$6$override"
        password_encrypted: true
        groups: ["sudo"]
        sudo_commands: "ALL"
        sudo_nopasswd: true
    proxmox_automatic_packages_effective: "{{ proxmox_automatic_debian_packages_default }}"
    proxmox_automatic_packages_additional:
      - postgresql-client
    proxmox_automatic_debian_partition_recipe_override: >-
      custom :: 512 512 512 ext4 method{ format } format{ } use_filesystem{ } filesystem{ ext4 } mountpoint{ / } .
    proxmox_automatic_debian_late_command_extra:
      - "in-target touch /root/preseed-extra-test"
  tasks:
    - name: Create temporary render directory
      ansible.builtin.tempfile:
        state: directory
        suffix: proxmox-automatic-debian-override
      register: proxmox_automatic_test_render_dir

    - name: Apply Debian override scenario facts
      ansible.builtin.set_fact:
        proxmox_automatic_language: "en_US.UTF-8"
        proxmox_automatic_keyboard_layout: "de"
        proxmox_automatic_timezone: "Europe/Berlin"
        proxmox_automatic_dhcp_enabled: true
        proxmox_automatic_install_source: "online"
        proxmox_automatic_networks: []
        proxmox_automatic_storage_config:
          - name: virtio0
            disk: vda
            bootloader: true
            partitions: []
            vg: []
        proxmox_automatic_users_merged:
          - name: "dbadmin"
            fullname: "DB Admin"
            password: "$6$override"
            password_encrypted: true
            groups: ["sudo"]
            sudo_commands: "ALL"
            sudo_nopasswd: true
        proxmox_automatic_packages_effective: "{{ proxmox_automatic_debian_packages_default }}"
        proxmox_automatic_packages_additional:
          - postgresql-client
        proxmox_automatic_debian_partition_recipe_override: >-
          custom :: 512 512 512 ext4 method{ format } format{ } use_filesystem{ } filesystem{ ext4 } mountpoint{ / } .
        proxmox_automatic_debian_late_command_extra:
          - "in-target touch /root/preseed-extra-test"

    - name: Render Debian override preseed template
      ansible.builtin.template:
        src: "{{ [playbook_dir, '..', 'templates', 'preseed.cfg.j2'] | path_join | realpath }}"
        dest: "{{ proxmox_automatic_test_render_dir.path }}/preseed-override.cfg"
        mode: "0644"
      vars:
        template_render_time: "test"

    - name: Read Debian override preseed file
      ansible.builtin.slurp:
        src: "{{ proxmox_automatic_test_render_dir.path }}/preseed-override.cfg"
      register: proxmox_automatic_preseed_rendered

    - name: Assert Debian override preseed content
      ansible.builtin.assert:
        that:
          - "'d-i netcfg/disable_autoconfig boolean false' in preseed_content"
          - "'d-i partman-auto/expert_recipe string custom ::' in preseed_content"
          - "'postgresql-client' in preseed_content"
          - "'touch /root/preseed-extra-test' in preseed_content"
          - "preseed_content is not search('\\\\{\\\\{')"
      vars:
        preseed_content: "{{ proxmox_automatic_preseed_rendered.content | b64decode }}"

    - name: Remove temporary render directory
      ansible.builtin.file:
        path: "{{ proxmox_automatic_test_render_dir.path }}"
        state: absent

