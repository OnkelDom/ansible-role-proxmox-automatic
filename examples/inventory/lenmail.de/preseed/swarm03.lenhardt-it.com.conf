    echo "ssh-rsa  simon.ebert@reifen-wolf.de" >> /target/home/litsadmin/.ssh/authorized_keys; \
    echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICroa0LqJaiyAV2O94e3tVFczBZsPD1vdFs6V3ZcOnk0 simon.ebert@reifen-wolf.de" >> /target/home/litsadmin/.ssh/authorized_keys; \
