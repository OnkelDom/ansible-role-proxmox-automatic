#### Debian 13 (Trixie) Preseed - Minimal Base
#### Revised: 2025-11-02

###############################################################################
# LOCALE & KEYBOARD
###############################################################################
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string DE
d-i keyboard-configuration/xkb-keymap select de

###############################################################################
# TIME / CLOCK
###############################################################################
d-i time/zone string Europe/Berlin
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string time.cloudflare.com

###############################################################################
# NETWORK (Static)
###############################################################################
d-i netcfg/choose_interface select enp6s18
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 10.30.30.13
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 10.30.30.1
d-i netcfg/get_nameservers string 10.30.30.1
d-i netcfg/confirm_static boolean true
d-i netcfg/get_hostname string swarm03
d-i netcfg/get_domain string lenhardt-it.com
d-i netcfg/hostname string swarm03.lenhardt-it.com

###############################################################################
# MIRROR / APT
###############################################################################
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org
# Falls Firmware nĂ¶tig:
# d-i apt-setup/non-free-firmware boolean true

###############################################################################
# USERS
###############################################################################
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string LITS Admin
d-i passwd/username string litsadmin
d-i passwd/user-password-crypted password $6$PrIXdIH.68LkgqTX$umCfm7YfftF2akke06OBJxpSD0cE0mtdFakocSZRfYgnaTZ31D5wCrOEeVFOyXnANvEdmOq2Bheybt40MYoki/
d-i passwd/user-uid string 1000
d-i passwd/user-default-groups string sudo

###############################################################################
# DISK / LVM (vda)
###############################################################################
d-i partman-auto/disk string /dev/vda
d-i partman-auto/method string lvm
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Expert recipe:
# 1: EFI 512â€“1024 MiB
# 2: /boot 1 GiB
# 3: LVM PV rest der Disk -> VG "system"
# LVs: root(12G), docker(12G), log(6G), swap(2G)
d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              512 1024 1024 fat32                             \
                      $primary{ }                             \
                      method{ efi } format{ }                 \
                      mountpoint{ /boot/efi }                 \
              .                                               \
              1024 1024 1024 ext4                             \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ /boot }                     \
              .                                               \
              1024 100% 100% lvm                              \
                      $primary{ }                             \
                      method{ lvm }                           \
                      device{ /dev/vda }                      \
                      vg_name{ system }                       \
              .                                               \
              12288 12288 12288 xfs                           \
                      $lvmok{ } in_vg{ system }               \
                      lv_name{ root }                         \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ xfs }     \
                      mountpoint{ / }                         \
              .                                               \
              12288 12288 12288 xfs                           \
                      $lvmok{ } in_vg{ system }               \
                      lv_name{ docker }                       \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ xfs }     \
                      mountpoint{ /var/lib/docker }           \
              .                                               \
              6192 6192 6192 xfs                              \
                      $lvmok{ } in_vg{ system }               \
                      lv_name{ log }                          \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ xfs }     \
                      mountpoint{ /var/log }                  \
              .                                               \
              2048 4096 4096 linux-swap                       \
                      $lvmok{ } in_vg{ system }               \
                      lv_name{ swap }                         \
                      method{ swap } format{ }                \
              .

d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

###############################################################################
# BOOTLOADER
###############################################################################
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/vda
d-i grub-installer/with_other_os boolean false
d-i grub-installer/target string x86_64-efi

###############################################################################
# PACKAGES / TASKS
###############################################################################
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string bash-completion curl git sudo vim wget qemu-guest-agent python3 python3-pip python3-apt ca-certificates lsb-release htop
# Upgrade-Modus (optional anpassen)
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

###############################################################################
# FINISHING
###############################################################################
d-i finish-install/reboot boolean true
d-i debian-installer/exit/poweroff boolean false

