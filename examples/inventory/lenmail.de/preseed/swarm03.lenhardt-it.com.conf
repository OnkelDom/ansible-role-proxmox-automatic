    echo "    dns-nameservers 10.30.30.1" >> /target/etc/network/interfaces; \
    in-target hostnamectl set-hostname swarm03.lenhardt-it.com; \
    echo "127.0.0.1 localhost" >> /target/etc/hosts; \
    echo "::1 localhost" >> /target/etc/hosts; \
    echo "10.30.30.13 swarm03.lenhardt-it.com swarm03" >> /target/etc/hosts; \
    echo "10.30.30.11 swarm01.lenhardt-it.com swarm01" >> /target/etc/hosts; \
    echo "10.30.30.12 swarm02.lenhardt-it.com swarm02" >> /target/etc/hosts; \
    in-target systemctl disable NetworkManager; \
    in-target localectl set-keymap de-latin1-nodeadkeys; \
    in-target localectl set-x11-keymap de pc105 nodeadkeys; \
    in-target systemctl enable ssh; \
    in-target systemctl enable qemu-guest-agent
