---
# Proxmox VE 9 migrated HA groups to HA rules. Keep the preparatory task path
# but only gather cluster node preferences here; the actual resource/rule
# creation happens in create_vm.yml after the VM exists.
- name: "Collect all unique hypervisors for HA rules"
  ansible.builtin.set_fact:
    all_hypervisors: "{{ ansible_play_hosts | map('extract', hostvars, 'proxmox_automatic_hypervisor') | unique | list }}"
  run_once: true
  delegate_to: localhost
  when:
    - proxmox_automatic_ha_enabled | bool
    - proxmox_automatic_ha_group_auto | bool
  tags:
    - proxmox_automatic_ha

- name: "Debug: Show collected hypervisors for HA rules"
  ansible.builtin.debug:
    msg: "Found hypervisors for HA rules: {{ all_hypervisors }}"
  run_once: true
  delegate_to: localhost
  when:
    - proxmox_automatic_ha_enabled | bool
    - proxmox_automatic_ha_group_auto | bool
    - all_hypervisors | default([]) | length > 0
  tags:
    - proxmox_automatic_ha
